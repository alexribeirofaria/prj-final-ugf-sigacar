services:
  ugf-sigacar:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: alexfariakof/ugf-sigacar:latest
    container_name: ugf-sigacar
    restart: unless-stopped
    ports:
      - 5000:5000
    expose:
      - 5000
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      CONNECTION_STRING: Data Source=/app/data/app.db

    volumes:
      - sqlite-data:/app/data

    networks:
      - ugf-network

    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

volumes:
  sqlite-data:

networks:
  ugf-network:
    driver: bridge